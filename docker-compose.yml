# ========================================
# DEVELOPMENT DOCKER COMPOSE CONFIGURATION
# ========================================
# For development: PostgreSQL + Redis only (no OpenSearch)
# Run: docker-compose up -d db redis

services:
  db:
    image: postgres:16-alpine
    container_name: mini_soc_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SocSecurePass123!
      POSTGRES_DB: mini_soc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  redis:
    image: redis:7-alpine
    container_name: mini_soc_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

