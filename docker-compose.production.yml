# ========================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# ========================================
# All secrets and ports come from .env.production (generated by deploy_on_wazuh.sh)
# DO NOT hardcode any values here.

services:

  # ─────────────────────────────────────────────────────────────
  # DATABASE
  # ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: mini_soc_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mini_soc_prod}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mini_soc_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - soc_net

  # ─────────────────────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mini_soc_redis_prod
    restart: always
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ]; then
        redis-server --requirepass $$REDIS_PASSWORD --appendonly yes;
      else
        redis-server --appendonly yes;
      fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: >
        sh -c "if [ -n '$$REDIS_PASSWORD' ]; then
          redis-cli -a $$REDIS_PASSWORD ping;
        else
          redis-cli ping;
        fi"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - soc_net

  # ─────────────────────────────────────────────────────────────
  # BACKEND (FastAPI)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    image: mini_soc_backend:latest
    container_name: mini_soc_backend_prod
    restart: always
    environment:
      # Core
      ENV: production
      DEBUG: "false"
      PROJECT_NAME: "Mini SOC Portal"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_V1_STR: /api/v1
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      WS_TICKET_EXPIRE_SECONDS: ${WS_TICKET_EXPIRE_SECONDS:-60}
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-10}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      COOKIE_SECURE: "false"
      COOKIE_DOMAIN: ""
      CSRF_VALIDATE_ORIGIN: "false"
      # Database
      POSTGRES_SERVER: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mini_soc_prod}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: "0"
      # Wazuh
      WAZUH_API_URL: ${WAZUH_API_URL}
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD}
      WAZUH_VERIFY_SSL: "false"
      WAZUH_ALERTS_FILE: /var/ossec/logs/alerts/alerts.json
      # Zabbix
      ZABBIX_API_URL: ${ZABBIX_API_URL:-http://localhost/zabbix/api_jsonrpc.php}
      ZABBIX_API_USER: ${ZABBIX_API_USER:-Admin}
      ZABBIX_API_PASSWORD: ${ZABBIX_API_PASSWORD:-zabbix}
      ZABBIX_VERIFY_SSL: "false"
      ZABBIX_TIMEOUT: "30"
      ZABBIX_ENABLED: ${ZABBIX_ENABLED:-true}
      # Email Notifications
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      # GeoIP / Observability
      GEOIP_DB_PATH: /usr/share/GeoIP/GeoLite2-City.mmdb
      ENABLE_SENTRY: "false"
      SENTRY_DSN: ""
    volumes:
      - ${WAZUH_ALERTS_HOST_PATH:-/var/ossec/logs/alerts}:/var/ossec/logs/alerts:ro
    # Backend is NOT exposed externally — Nginx proxies to it internally
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - soc_net

  # ─────────────────────────────────────────────────────────────
  # FRONTEND (React → Nginx static server)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        # Vite bakes the URL at build-time — must use the actual server IP/port
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    image: mini_soc_frontend:latest
    container_name: mini_soc_frontend_prod
    restart: always
    # No external port — traffic reaches it through the nginx reverse-proxy
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - soc_net

  # ─────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY  (the ONLY externally-exposed service)
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: mini_soc_nginx_prod
    restart: always
    ports:
      - "${NGINX_PORT:-2709}:80"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - soc_net

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  soc_net:
    driver: bridge
