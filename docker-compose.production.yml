# ========================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# ========================================
# For production: Full stack (PostgreSQL + Redis + Backend + Frontend)

services:
  db:
    image: postgres:16-alpine
    container_name: mini_soc_db_prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      # Remember to use a strong, secret password or Docker secrets in a real deployment
      POSTGRES_PASSWORD: SocSecurePass123!
      POSTGRES_DB: mini_soc
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    # Exposing DB ports is generally discouraged in production for security reasons
    # Only keep this if you need external access to the DB
    # ports:
    #   - "5434:5432" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network_prod

  redis:
    image: redis:7-alpine
    container_name: mini_soc_redis_prod
    restart: always
    # Redis port is typically not exposed publicly in production
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network_prod

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    image: mini_soc_backend:latest
    container_name: mini_soc_backend_prod
    restart: always
    # It's better to manage env vars through CI/CD or Docker Secrets in production
    # env_file: ./backend/.env
    environment:
      - ENV=production
      - DEBUG=false
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WAZUH_ALERTS_FILE=/var/ossec/logs/alerts/alerts.json
    volumes:
      # Removed local source code binding (./backend:/app) to use the built image
      - ${WAZUH_ALERTS_HOST_PATH:-/var/ossec/logs/alerts}:/var/ossec/logs/alerts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soc_network_prod

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        # Trong production, VITE_API_URL và VITE_WS_URL cần được truyền lúc BUILD
        # Bạn nên đổi 'localhost' thành IP thật của server hoặc domain name
        # Nếu dùng chung Nginx proxy (nginx.conf), bạn có thể để URL tương đối:
        # VITE_API_URL=/api/v1
        # VITE_WS_URL=/ws
        - VITE_API_URL=http://localhost:8000/api/v1
        - VITE_WS_URL=ws://localhost:8000/ws
    image: mini_soc_frontend:latest
    container_name: mini_soc_frontend_prod
    restart: always
    # Xoá environment variables ở đây vì Nginx runtime không dùng tới chúng, Vite cần ở lúc build
    depends_on:
      - backend
    ports:
      # Expose frontend trên port 80
      - "8080:80" 
    networks:
      - soc_network_prod

volumes:
  postgres_data_prod:
  redis_data_prod:

networks:
  soc_network_prod:
    driver: bridge
