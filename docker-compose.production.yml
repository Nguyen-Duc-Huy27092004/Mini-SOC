
# Production: PostgreSQL + Redis + Wazuh alerts mount (không OpenSearch)

services:
  db:
    image: postgres:16-alpine
    container_name: mini_soc_db_prod
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "-c log_min_duration_statement=5000 -c max_connections=100"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./db_backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  redis:
    image: redis:7-alpine
    container_name: mini_soc_redis_prod
    restart: always
    env_file: .env.production
    entrypoint: /bin/sh
    command: -c 'redis-server --appendonly yes --requirepass $${REDIS_PASSWORD}'
    volumes:
      - redis_data_prod:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: mini_soc_backend_prod
    restart: always
    env_file: .env.production
    environment:
      # Core settings
      ENV: production
      DEBUG: "false"
      PROJECT_NAME: ${PROJECT_NAME}
      API_V1_STR: ${API_V1_STR}
      LOG_LEVEL: ${LOG_LEVEL}
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      WS_TICKET_EXPIRE_SECONDS: ${WS_TICKET_EXPIRE_SECONDS}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      COOKIE_SECURE: ${COOKIE_SECURE}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      CSRF_VALIDATE_ORIGIN: ${CSRF_VALIDATE_ORIGIN}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      
      # Rate limiting
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
      WS_RATE_LIMIT_PER_MINUTE: ${WS_RATE_LIMIT_PER_MINUTE}
      
      # Database
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE}
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      
      # Wazuh
      WAZUH_API_URL: ${WAZUH_API_URL}
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD}
      WAZUH_VERIFY_SSL: ${WAZUH_VERIFY_SSL}
      WAZUH_ALERTS_FILE: /var/ossec/logs/alerts/alerts.json
      
      # OpenSearch (optional)
      OPENSEARCH_HOSTS: ${OPENSEARCH_HOSTS:-}
      OPENSEARCH_USER: ${OPENSEARCH_USER:-}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-}
      OPENSEARCH_VERIFY_CERTS: ${OPENSEARCH_VERIFY_CERTS:-false}
      
      # GeoIP
      GEOIP_DB_PATH: ${GEOIP_DB_PATH}
    volumes:
      - ${WAZUH_ALERTS_HOST_PATH:-./data/wazuh}:/var/ossec/logs/alerts:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - soc_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:2709/api/v1}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:2709/ws}
    container_name: mini_soc_frontend_prod
    restart: always
    env_file: .env.production
    ports:
      - "3001:80"
    networks:
      - soc_network

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: mini_soc_nginx_prod
    restart: always
    env_file: .env.production
    ports:
      - "${NGINX_PORT:-2709}:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - soc_network

volumes:
  postgres_data_prod:
  redis_data_prod:
  nginx_logs:

networks:
  soc_network:
    driver: bridge
