name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mini_soc_test
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Bandit
        run: pip install bandit && bandit -r backend/app -ll
      - name: Pytest
        working-directory: backend
        env:
          ENV: development
          SECRET_KEY: test-secret-key-minimum-32-chars-long!!
          POSTGRES_PASSWORD: postgres
          POSTGRES_SERVER: localhost
          POSTGRES_DB: mini_soc_test
          REDIS_HOST: localhost
          WAZUH_API_PASSWORD: test-wazuh-password
          WAZUH_ALERTS_FILE: ""
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install & build
        working-directory: frontend
        run: npm ci && npm run build

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t mini-soc-backend ./backend
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mini-soc-backend
          severity: CRITICAL,HIGH
